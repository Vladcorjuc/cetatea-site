<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <title>Biserica Cetatea | Lisaura, Suceava</title>
    <meta
      name="description"
      content="Biserica Penticostală Cetatea din Lisaura, Suceava. Vino așa cum ești."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#d6673b" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="assets/logo/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Karla:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme/language before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('cetatea-theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var l = localStorage.getItem('cetatea-lang');
          if (l === 'ro' || l === 'en') document.documentElement.lang = l;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
