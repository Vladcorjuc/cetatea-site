<header class="header">
  <div class="container header__bar">
    <a routerLink="/" class="header__brand" (click)="inchideMeniu()">
      <img src="assets/logo/badge-terracotta.svg" alt="" class="header__mark" />
      <span class="header__wordmark">
        <strong>{{ site()?.numeBiserica ?? 'Cetatea' }}</strong>
        <small>Biserica Penticostală</small>
      </span>
    </a>

    <nav class="header__nav" [class.header__nav--open]="meniuDeschis()">
      <ul>
        @for (link of linkuri; track link.ruta) {
          <li>
            <a
              [routerLink]="link.ruta"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: link.ruta === '/' }"
              (click)="inchideMeniu()"
            >
              {{ link.text }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <button
      type="button"
      class="header__toggle"
      (click)="toggleMeniu()"
      [attr.aria-expanded]="meniuDeschis()"
      aria-label="Comută meniul"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
