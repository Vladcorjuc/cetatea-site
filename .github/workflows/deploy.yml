# Publică site-ul pe GitHub Pages la fiecare push pe `main`
# (inclusiv commit-urile făcute din panoul de administrare Decap CMS).
name: Deploy pe GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # base-href-ul este derivat automat din numele repo-ului, deci
      # workflow-ul funcționează indiferent cum se va numi repo-ul.
      - run: npm run build -- --base-href "/${GITHUB_REPOSITORY#*/}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cetatea-site/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
