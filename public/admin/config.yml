# Configurația Decap CMS — panoul de administrare a conținutului.
#
# ÎNAINTE DE PUBLICARE: înlocuiește `NUME_UTILIZATOR/cetatea-site` cu repo-ul
# real de GitHub și `base_url` cu adresa proxy-ului OAuth (vezi SETUP.md).
backend:
  name: github
  repo: Vladcorjuc/cetatea-site
  branch: main
  base_url: https://cetatea-decap-oauth.cetatea-decap-oauth.workers.dev

# Pentru testare locală: rulează `npx decap-server` și decomentează linia de mai jos.
# local_backend: true

locale: ro
site_url: /
display_url: /
logo_url: /cetatea-site/assets/logo/lockup-vertical-cream.svg

media_folder: public/assets/uploads
public_folder: assets/uploads

collections:
  # Panoul de previzualizare implicit al Decap nu seamănă cu site-ul real și
  # poate produce erori la salvare; îl dezactivăm pentru toate colecțiile.
  - name: setari
    label: 'Setări generale'
    editor:
      preview: false
    files:
      - name: site
        label: 'Date de contact și program'
        file: public/content/site.json
        fields:
          - { name: numeBiserica, label: 'Numele scurt al bisericii', widget: string }
          - { name: denumireCompleta, label: 'Denumirea completă', widget: string }
          - { name: motto, label: 'Motto / verset', widget: string }
          - { name: adresa, label: 'Adresă', widget: string }
          - { name: oras, label: 'Oraș', widget: string }
          - { name: email, label: 'Email', widget: string }
          - { name: telefon, label: 'Telefon', widget: string }
          - name: programDuminica
            label: 'Program întâlniri'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: interval, label: 'Interval orar', widget: string }
          - name: retele
            label: 'Rețele sociale'
            widget: list
            fields:
              - name: nume
                label: 'Rețea'
                widget: select
                options: [Facebook, Instagram, Youtube, TikTok, Spotify]
              - { name: link, label: 'Link', widget: string }

  - name: pagini
    label: 'Pagini'
    editor:
      preview: false
    files:
      - name: acasa
        label: 'Pagina Acasă'
        file: public/content/ro/acasa.json
        fields:
          - { name: heroEyebrow, label: 'Text mic deasupra titlului', widget: string }
          - { name: heroTitluLinia1, label: 'Titlu — primul rând', widget: string }
          - { name: heroTitluLinia2, label: 'Titlu — al doilea rând', widget: string }
          - { name: heroSubtitlu, label: 'Subtitlu', widget: text }
          - { name: heroButonText, label: 'Textul butonului', widget: string }
          - { name: heroButonRuta, label: 'Ruta butonului (ex: /contact)', widget: string }
          - { name: heroImagine, label: 'Imaginea de fundal', widget: image, required: false }
          - { name: misiuneTitlu, label: 'Titlul secțiunii de misiune', widget: string }
          - { name: misiuneText, label: 'Textul misiunii', widget: text }
          - name: carduri
            label: 'Carduri de lucrare'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: text, label: 'Text', widget: text }
              - { name: linkText, label: 'Textul linkului', widget: string }
              - { name: linkRuta, label: 'Ruta linkului (ex: /grupuri)', widget: string }
          - { name: evenimenteTitlu, label: 'Titlul secțiunii de evenimente', widget: string }

      - name: despre
        label: 'Pagina Despre noi'
        file: public/content/ro/despre.json
        fields:
          - { name: titlu, label: 'Titlul paginii', widget: string }
          - { name: cineSuntemTitlu, label: 'Titlu „Cine suntem”', widget: string }
          - { name: cineSuntemText, label: 'Text „Cine suntem”', widget: text }
          - { name: scopTitlu, label: 'Titlu „Scop”', widget: string }
          - { name: scopText, label: 'Text „Scop”', widget: text }
          - { name: viziuneTitlu, label: 'Titlu „Viziune”', widget: string }
          - { name: viziuneText, label: 'Text „Viziune”', widget: text }
          - { name: misiuneTitlu, label: 'Titlu „Misiune”', widget: string }
          - { name: misiuneText, label: 'Text „Misiune”', widget: text }
          - { name: obiectiveTitlu, label: 'Eticheta secțiunii „Valori”', widget: string }
          - { name: obiectiveSubtitlu, label: 'Subtitlu „Valori”', widget: string }
          - name: obiective
            label: 'Valori'
            widget: list
            fields:
              - { name: text, label: 'Valoare', widget: string }
          - { name: strategieTitlu, label: 'Eticheta secțiunii „Strategie”', widget: string }
          - { name: strategieSubtitlu, label: 'Subtitlu „Strategie”', widget: string }
          - name: strategie
            label: 'Puncte de strategie'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: text, label: 'Text', widget: text }
          - { name: ceCredemTitlu, label: 'Titlu „Ce credem”', widget: string }
          - { name: ceCredemVerset, label: 'Verset', widget: string }
          - { name: ceCredemVersetReferinta, label: 'Referința versetului', widget: string }
          - name: ceCredem
            label: 'Articole de credință (taburi)'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: text, label: 'Text', widget: text }

      - name: comunitate
        label: 'Pagina Comunitate'
        file: public/content/ro/comunitate.json
        fields:
          - { name: titlu, label: 'Titlul paginii', widget: string }
          - { name: introText, label: 'Text introductiv', widget: text }
          - name: grupuri
            label: 'Grupuri'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: descriere, label: 'Descriere', widget: text }
              - { name: program, label: 'Program (ex: Vineri, 19:00)', widget: string }
              - { name: imagine, label: 'Imagine', widget: image, required: false }

      - name: contact
        label: 'Pagina Contact'
        file: public/content/ro/contact.json
        fields:
          - { name: titlu, label: 'Titlul paginii', widget: string }
          - { name: introText, label: 'Text introductiv', widget: text }

      - name: general
        label: 'General (motto)'
        file: public/content/ro/general.json
        fields:
          - { name: motto, label: 'Motto / verset (subsol)', widget: string }

  - name: pagini_en
    label: 'Pagini (English)'
    editor:
      preview: false
    files:
      - name: acasa_en
        label: 'Home page'
        file: public/content/en/acasa.json
        fields:
          - { name: heroEyebrow, label: 'Small text above title', widget: string }
          - { name: heroTitluLinia1, label: 'Title — first line', widget: string }
          - { name: heroTitluLinia2, label: 'Title — second line', widget: string }
          - { name: heroSubtitlu, label: 'Subtitle', widget: text }
          - { name: heroButonText, label: 'Button text', widget: string }
          - { name: heroButonRuta, label: 'Button route (e.g. /contact)', widget: string }
          - { name: heroImagine, label: 'Background image', widget: image, required: false }
          - { name: misiuneTitlu, label: 'Mission section title', widget: string }
          - { name: misiuneText, label: 'Mission text', widget: text }
          - name: carduri
            label: 'Ministry cards'
            widget: list
            fields:
              - { name: titlu, label: 'Title', widget: string }
              - { name: text, label: 'Text', widget: text }
              - { name: linkText, label: 'Link text', widget: string }
              - { name: linkRuta, label: 'Link route (e.g. /comunitate)', widget: string }
          - { name: evenimenteTitlu, label: 'Events section title', widget: string }

      - name: despre_en
        label: 'About page'
        file: public/content/en/despre.json
        fields:
          - { name: titlu, label: 'Page title', widget: string }
          - { name: cineSuntemTitlu, label: 'Title „Who we are”', widget: string }
          - { name: cineSuntemText, label: 'Text „Who we are”', widget: text }
          - { name: scopTitlu, label: 'Title „Purpose”', widget: string }
          - { name: scopText, label: 'Text „Purpose”', widget: text }
          - { name: viziuneTitlu, label: 'Title „Vision”', widget: string }
          - { name: viziuneText, label: 'Text „Vision”', widget: text }
          - { name: misiuneTitlu, label: 'Title „Mission”', widget: string }
          - { name: misiuneText, label: 'Text „Mission”', widget: text }
          - { name: obiectiveTitlu, label: 'Values section label', widget: string }
          - { name: obiectiveSubtitlu, label: 'Values subtitle', widget: string }
          - name: obiective
            label: 'Values'
            widget: list
            fields:
              - { name: text, label: 'Value', widget: string }
          - { name: strategieTitlu, label: 'Strategy section label', widget: string }
          - { name: strategieSubtitlu, label: 'Strategy subtitle', widget: string }
          - name: strategie
            label: 'Strategy points'
            widget: list
            fields:
              - { name: titlu, label: 'Title', widget: string }
              - { name: text, label: 'Text', widget: text }
          - { name: ceCredemTitlu, label: 'Title „What we believe”', widget: string }
          - { name: ceCredemVerset, label: 'Verse', widget: string }
          - { name: ceCredemVersetReferinta, label: 'Verse reference', widget: string }
          - name: ceCredem
            label: 'Statements of faith (tabs)'
            widget: list
            fields:
              - { name: titlu, label: 'Title', widget: string }
              - { name: text, label: 'Text', widget: text }

      - name: comunitate_en
        label: 'Community page'
        file: public/content/en/comunitate.json
        fields:
          - { name: titlu, label: 'Page title', widget: string }
          - { name: introText, label: 'Intro text', widget: text }
          - name: grupuri
            label: 'Groups'
            widget: list
            fields:
              - { name: titlu, label: 'Title', widget: string }
              - { name: descriere, label: 'Description', widget: text }
              - { name: program, label: 'Schedule (e.g. Friday, 19:00)', widget: string }
              - { name: imagine, label: 'Image', widget: image, required: false }

      - name: contact_en
        label: 'Contact page'
        file: public/content/en/contact.json
        fields:
          - { name: titlu, label: 'Page title', widget: string }
          - { name: introText, label: 'Intro text', widget: text }

      - name: general_en
        label: 'General (motto)'
        file: public/content/en/general.json
        fields:
          - { name: motto, label: 'Motto / verse (footer)', widget: string }

  - name: media
    label: 'Media'
    editor:
      preview: false
    files:
      - name: predici
        label: 'Predici'
        file: public/content/media/predici.json
        fields:
          - name: predici
            label: 'Lista de predici'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: data, label: 'Data (AAAA-LL-ZZ)', widget: string }
              - { name: link, label: 'Link (YouTube etc.)', widget: string }
              - { name: descriere, label: 'Descriere', widget: text }
              - { name: thumbnail, label: 'Imagine', widget: image, required: false }

      - name: podcast
        label: 'Podcast'
        file: public/content/media/podcast.json
        fields:
          - name: episoade
            label: 'Lista de episoade'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: data, label: 'Data (AAAA-LL-ZZ)', widget: string }
              - { name: link, label: 'Link (Spotify etc.)', widget: string }
              - { name: descriere, label: 'Descriere', widget: text }
              - { name: thumbnail, label: 'Imagine', widget: image, required: false }

      - name: evenimente
        label: 'Evenimente'
        file: public/content/evenimente.json
        fields:
          - name: evenimente
            label: 'Lista de evenimente'
            widget: list
            fields:
              - { name: titlu, label: 'Titlu', widget: string }
              - { name: data, label: 'Data (AAAA-LL-ZZ)', widget: string }
              - { name: interval, label: 'Interval orar', widget: string }
              - { name: locatie, label: 'Locație', widget: string }

  - name: articole
    label: 'Articole'
    label_singular: 'Articol'
    editor:
      preview: false
    folder: public/content/articole
    extension: md
    create: true
    slug: '{{slug}}'
    fields:
      - { name: titlu, label: 'Titlu', widget: string }
      - { name: data, label: 'Data', widget: datetime, format: 'YYYY-MM-DD', time_format: false }
      - { name: coperta, label: 'Imagine de copertă', widget: image, required: false }
      - { name: rezumat, label: 'Rezumat', widget: text }
      - { name: body, label: 'Conținut', widget: markdown }
